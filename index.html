<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#D97706">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HoneyTaste">
  <title>HoneyHive Tasting</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.0/dist/cdn.min.js"></script>
  <style>
    @media (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body class="bg-amber-50 min-h-screen" x-data="tastingApp">
  <div class="min-h-screen flex flex-col">
    <header class="bg-amber-600 text-white p-4 sticky top-0 z-10" x-show="!showComplete">
      <div class="max-w-xl mx-auto flex items-center justify-between">
        <h1 class="text-lg font-bold">HoneyHive Tasting</h1>
        <div class="flex items-center gap-2 text-sm">
          <span class="bg-amber-400 px-2 py-0.5 rounded" x-text="currentSample + 1"></span>
          <span class="text-amber-200">/</span>
          <span x-text="samples.length"></span>
        </div>
      </div>
      <div class="max-w-xl mx-auto mt-2 h-1.5 bg-amber-400 rounded-full overflow-hidden">
        <div class="h-full bg-white transition-all duration-300" :style="'width: ' + ((currentSample / samples.length) * 100) + '%'"></div>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-4 pb-20 max-w-xl mx-auto w-full">
      <template x-for="(sample, index) in samples" :key="index">
        <div x-show="currentSample === index && !showComplete" x-transition.opacity class="animate-fade-in">
          <article class="bg-white rounded-2xl shadow-sm border border-amber-100 p-5 mb-4">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h2 class="text-2xl font-bold text-amber-900" x-text="sample.varietal"></h2>
                <p class="text-amber-700 text-sm" x-text="sample.region"></p>
              </div>
              <div class="text-right">
                <p class="text-xs text-gray-500">Sample ID</p>
                <p class="font-mono text-sm text-amber-800" x-text="sample.sampleId"></p>
              </div>
            </div>
            <p class="text-sm text-gray-600 mb-5" x-text="'by ' + sample.producerName"></p>
            <div class="space-y-4 mb-5" x-data="{ expanded: {} }">
              <template x-for="attr in attributes" :key="attr.key">
                <div class="bg-amber-50 rounded-xl p-4">
                  <div class="flex items-center justify-between mb-3">
                    <label class="font-medium text-amber-900 text-sm" x-text="attr.label"></label>
                    <button @click="expanded[attr.key] = !expanded[attr.key]" class="text-amber-500 text-xs">
                      <span x-text="expanded[attr.key] ? 'hide' : 'what\'s this?'"></span>
                    </button>
                  </div>
                  <p class="text-xs text-amber-700 mb-3 line-clamp-2" x-show="expanded[attr.key]" x-text="attr.description"></p>
                  <div class="flex gap-1.5" role="radiogroup" :aria-label="attr.label">
                    <template x-for="n in 5" :key="n">
                      <button type="button"
                              @click="setRating(sample.sampleId, attr.key, n)"
                              :class="ratingClass(sample.sampleId, attr.key, n)"
                              class="flex-1 h-11 rounded-xl border-2 font-semibold text-sm transition-all active:scale-95"
                              :aria-label="attr.label + ': ' + n + ' out of 5'"
                              :aria-checked="getRating(sample.sampleId, attr.key) === n">
                        <span x-text="n"></span>
                      </button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
            <div class="grid grid-cols-[1fr_auto] gap-4 mb-4 items-end">
              <div>
                <label class="block text-sm font-medium text-amber-900 mb-2">Overall</label>
                <div class="flex gap-1.5" role="radiogroup" aria-label="Overall rating">
                  <template x-for="n in 5" :key="n">
                    <button type="button"
                            @click="setOverall(sample.sampleId, n)"
                            :class="overallClass(sample.sampleId, n)"
                            class="flex-1 h-14 rounded-xl border-2 font-bold text-base transition-all active:scale-95"
                            :aria-label="'Overall: ' + n + ' out of 5'"
                            :aria-checked="getOverall(sample.sampleId) === n">
                      <span x-text="n"></span>
                    </button>
                  </template>
                </div>
              </div>
              <label class="flex items-center gap-2 cursor-pointer self-end pb-2">
                <input type="checkbox"
                       :checked="getBuyAgain(sample.sampleId)"
                       @change="toggleBuyAgain(sample.sampleId)"
                       class="w-5 h-5 text-amber-600 rounded border-gray-300 focus:ring-2 focus:ring-amber-500 focus:ring-offset-2">
                <span class="text-sm text-amber-800 font-medium">Buy again</span>
              </label>
            </div>
            <div class="mb-4">
              <label class="block text-sm font-medium text-amber-900 mb-1">Notes</label>
              <textarea x-model="getNotes(sample.sampleId)"
                        class="w-full p-3 border border-amber-200 rounded-xl text-sm h-16 focus:ring-2 focus:ring-amber-500 focus:border-transparent resize-none"
                        placeholder="floral, clean finish, great in tea..."></textarea>
            </div>
            <div class="flex justify-between pt-3 border-t border-amber-100">
              <button @click="prevSample()"
                      :disabled="currentSample === 0"
                      class="px-6 py-2.5 text-amber-700 border border-amber-300 rounded-xl disabled:opacity-40 disabled:cursor-not-allowed hover:bg-amber-50 transition font-medium">
                ← Previous
              </button>
              <button @click="nextSample()"
                      :disabled="currentSample === samples.length - 1"
                      class="px-6 py-2.5 bg-amber-600 text-white rounded-xl disabled:opacity-40 disabled:cursor-not-allowed hover:bg-amber-700 transition font-medium">
                Next →
              </button>
            </div>
          </article>
        </div>
      </template>
      <div x-show="showComplete" x-transition.opacity class="animate-fade-in text-center py-12 px-4">
        <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="w-12 h-12 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-amber-900 mb-2">Tasting Complete!</h2>
        <p class="text-amber-700 mb-6 max-w-sm mx-auto">Your flavor profile is being generated. We'll match you with local honey you'll love.</p>
        <button @click="submitResults()"
                class="px-8 py-3 bg-amber-600 text-white rounded-xl hover:bg-amber-700 transition font-medium shadow-lg">
          Get My Honey Profile
        </button>
        <p class="mt-4 text-sm text-gray-500">Results saved locally. Works offline — syncs when online.</p>
      </div>
    </main>
    <footer x-show="showComplete" class="bg-white border-t border-amber-100 fixed bottom-0 left-0 right-0 p-3 safe-area-bottom">
      <div class="max-w-xl mx-auto flex justify-around text-center">
        <a href="/?new=1" class="flex flex-col items-center gap-1 text-amber-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          <span class="text-xs">New Tasting</span>
        </a>
        <a href="/profile.html" class="flex flex-col items-center gap-1 text-gray-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          <span class="text-xs">My Profile</span>
        </a>
        <a href="/marketplace.html" class="flex flex-col items-center gap-1 text-gray-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span class="text-xs">Marketplace</span>
        </a>
      </div>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
